// ========== 知识文章 ==========
const articles = [
    {
        title: "什么是尿酸？为什么会升高？",
        content: "<p>尿酸是人体代谢嘌呤时产生的废物，主要通过肾脏随尿液排出。正常情况下，人体每天产生的尿酸和排出的尿酸保持平衡。</p><p>当尿酸生成过多或排泄减少时，血液中的尿酸水平就会升高，形成高尿酸血症。长期高尿酸可能导致痛风、肾结石等问题。</p><p>尿酸升高的原因包括：遗传因素、饮食不当（高嘌呤食物摄入过多）、肥胖、饮酒、某些药物以及肾功能下降等。</p>"
    },
    {
        title: "高尿酸血症的诊断标准",
        content: "<p>高尿酸血症的诊断主要依据血液检查结果。正常参考值为：</p><p>• 男性：208-428 μmol/L（约3.5-7.2 mg/dL）</p><p>• 女性：155-357 μmol/L（约2.6-6.0 mg/dL）</p><p>当血尿酸水平超过420 μmol/L（7 mg/dL）时，即可诊断为高尿酸血症。需要注意的是，女性在绝经前由于雌激素的保护作用，尿酸水平通常较低。</p>"
    },
    {
        title: "痛风与尿酸的关系",
        content: "<p>痛风是一种因尿酸盐结晶沉积在关节而引起的炎症性疾病。当血尿酸浓度过高时，尿酸盐会形成针状结晶，沉积在关节、软组织和肾脏等部位。</p><p>痛风急性发作时，患者会感到关节剧烈疼痛、红肿、发热，最常见的发病部位是大脚趾。如果不及时治疗，痛风可能反复发作，形成痛风石，甚至损害关节和肾脏功能。</p>"
    },
    {
        title: "高嘌呤食物要少吃",
        content: "<p>控制嘌呤摄入是管理尿酸的重要措施。高嘌呤食物（每100g含嘌呤>150mg）应尽量避免：</p><p>• 动物内脏：肝、肾、脑、肠等</p><p>• 海鲜类：沙丁鱼、凤尾鱼、带鱼、干贝等</p><p>• 其他：浓肉汤、酵母粉、小鱼干</p><p>中嘌呤食物（50-150mg/100g）应适量食用，低嘌呤食物（<50mg/100g）可以放心食用。</p>"
    },
    {
        title: "多喝水有助于降尿酸",
        content: "<p>多喝水是降低尿酸最简单有效的方法之一。充足的水分可以稀释尿液中的尿酸浓度，促进尿酸随尿液排出，减少尿酸盐结晶形成的风险。</p><p>建议每天饮水2000-3000毫升，保持尿液呈淡黄色。可以选择白开水、淡茶水、柠檬水等。避免饮用含糖饮料和果汁，因为果糖会促进尿酸生成。</p><p>运动出汗后要及时补充水分，避免尿液浓缩。</p>"
    },

// ========== 记录功能 ==========
const STORAGE_KEY = 'uric_acid_records_v2';
let chart = null, currentRange = 7;

function init() {
    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
    loadRecords();
    renderFoodList();
    renderArticles();
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
}

function getRecords() {
    const d = localStorage.getItem(STORAGE_KEY);
    return d ? JSON.parse(d) : [];
}

function saveRecords(r) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(r));
}

function addRecord() {
    const date = document.getElementById('dateInput').value;
    const val = parseFloat(document.getElementById('valueInput').value);
    if (!date || !val || val <= 0) { alert('请输入有效的日期和数值'); return; }
    let recs = getRecords();
    const idx = recs.findIndex(r => r.date === date);
    if (idx >= 0) { if (confirm('该日期已有记录，覆盖？')) recs[idx].value = val; else return; }
    else recs.push({date, value: val, ts: Date.now()});
    recs.sort((a,b) => new Date(a.date) - new Date(b.date));
    saveRecords(recs);
    document.getElementById('valueInput').value = '';
    loadRecords();
    showToast('已保存');
}

function deleteRecord(date) {
    if (!confirm('删除这条记录？')) return;
    let recs = getRecords().filter(r => r.date !== date);
    saveRecords(recs);
    loadRecords();
}

function clearAll() {
    if (!confirm('清空所有记录？')) return;
    localStorage.removeItem(STORAGE_KEY);
    loadRecords();
}

function exportData() {
    const recs = getRecords();
    if (!recs.length) { alert('暂无数据'); return; }
    let csv = '日期,尿酸值(μmol/L)\n';
    recs.forEach(r => csv += `${r.date},${r.value}\n`);
    const blob = new Blob(['\ufeff'+csv], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `尿酸记录_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('已导出');
}

function getStatus(v) {
    if (v > 428) return {text:'偏高', cls:'tag-high', color:'#f44336'};
    if (v < 208) return {text:'偏低', cls:'tag-low', color:'#ff9800'};
    return {text:'正常', cls:'tag-normal', color:'#4CAF50'};
}

function switchRange(days) {
    currentRange = days;
    document.querySelectorAll('.chart-tab').forEach((t,i) => {
        t.classList.toggle('active', (days===7&&i===0)||(days===30&&i===1)||(days===90&&i===2));
    });
    renderChart();
}

function renderChart() {
    const recs = getRecords();
    const ctx = document.getElementById('trendChart').getContext('2d');
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - currentRange);
    const filtered = recs.filter(r => new Date(r.date) >= cutoff);
    const labels = filtered.map(r => { const d = new Date(r.date); return `${d.getMonth()+1}/${d.getDate()}`; });
    const values = filtered.map(r => r.value);
    if (chart) chart.destroy();
    if (!filtered.length) { ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height); ctx.font='14px sans-serif'; ctx.fillStyle='#999'; ctx.textAlign='center'; ctx.fillText('暂无数据', ctx.canvas.width/2, ctx.canvas.height/2); return; }
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [{ data: values, borderColor: '#4CAF50', backgroundColor: 'rgba(76,175,80,0.1)', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#f0f0f0' } }, x: { grid: { display: false } } } }
    });
}

function loadRecords() {
    const recs = getRecords();
    document.getElementById('totalCnt').textContent = recs.length;
    if (!recs.length) {
        document.getElementById('avgVal').textContent = '--';
        document.getElementById('maxVal').textContent = '--';
        document.getElementById('minVal').textContent = '--';
        document.getElementById('latestDate').textContent = '暂无记录';
        document.getElementById('latestVal').textContent = '--';
        document.getElementById('latestBox').style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        document.getElementById('historyList').innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 17v-2H4.5A2.5 2.5 0 0 1 2 12.5v-9A2.5 2.5 0 0 1 4.5 1h9A2.5 2.5 0 0 1 16 3.5V9h-2V3.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5H9z"/><path d="M20 12v5.5a2.5 2.5 0 0 1-2.5 2.5h-9a2.5 2.5 0 0 1-2.5-2.5V12"/><path d="M12 12v8"/><path d="M8 16l4 4 4-4"/></svg><p>暂无记录</p></div>';
        renderChart(); return;
    }
    const vals = recs.map(r => r.value);
    document.getElementById('avgVal').textContent = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
    document.getElementById('maxVal').textContent = Math.max(...vals).toFixed(1);
    document.getElementById('minVal').textContent = Math.min(...vals).toFixed(1);
    const latest = recs[recs.length-1];
    document.getElementById('latestDate').textContent = latest.date;
    document.getElementById('latestVal').textContent = latest.value.toFixed(1);
    const st = getStatus(latest.value);
    document.getElementById('latestBox').style.background = st.color === '#f44336' ? 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)' : st.color === '#ff9800' ? 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)' : 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
    document.getElementById('historyList').innerHTML = [...recs].reverse().map(r => {
        const s = getStatus(r.value);
        return `<div class="history-item"><span class="history-date">${r.date}</span><div><span class="history-val">${r.value.toFixed(1)}</span><span class="tag ${s.cls}">${s.text}</span><button onclick="deleteRecord('${r.date}')" style="margin-left:6px;background:none;border:none;color:#999;font-size:11px;cursor:pointer;">删除</button></div></div>`;
    }).join('');
    renderChart();
}

// ========== 饮食查询功能 ==========
function renderFoodList(filter = '') {
    const container = document.getElementById('foodList');
    const filtered = filter ? foodData.filter(f => f.name.includes(filter)) : foodData;
    const high = filtered.filter(f => f.level === 'high');
    const medium = filtered.filter(f => f.level === 'medium');
    const low = filtered.filter(f => f.level === 'low');
    
    let html = '';
    if (high.length) {
        html += `<div class="food-category"><div class="cat-title">🔴 高嘌呤 (限制食用)</div><div class="food-grid">${high.map(f => `<div class="food-item high" onclick="showFoodDetail('${f.name}')"><div class="food-name">${f.name}</div><div class="food-purine">${f.purine} ${f.unit}</div></div>`).join('')}</div></div>`;
    }
    if (medium.length) {
        html += `<div class="food-category"><div class="cat-title">🟡 中嘌呤 (适量食用)</div><div class="food-grid">${medium.map(f => `<div class="food-item medium" onclick="showFoodDetail('${f.name}')"><div class="food-name">${f.name}</div><div class="food-purine">${f.purine} ${f.unit}</div></div>`).join('')}</div></div>`;
    }
    if (low.length) {
        html += `<div class="food-category"><div class="cat-title">🟢 低嘌呤 (放心食用)</div><div class="food-grid">${low.map(f => `<div class="food-item low" onclick="showFoodDetail('${f.name}')"><div class="food-name">${f.name}</div><div class="food-purine">${f.purine} ${f.unit}</div></div>`).join('')}</div></div>`;
    }
    if (!filtered.length) html = '<div class="empty">未找到相关食物</div>';
    container.innerHTML = html;
}

function searchFood() {
    const val = document.getElementById('foodSearch').value.trim();
    renderFoodList(val);
}

function showFoodDetail(name) {
    const f = foodData.find(x => x.name === name);
    if (!f) return;
    const tips = f.level === 'high' ? '建议避免食用，特别是在痛风发作期。' : f.level === 'medium' ? '可以适量食用，控制每次摄入量。' : '嘌呤含量低，可以放心食用。';
    alert(`${f.name}\n嘌呤含量: ${f.purine} ${f.unit}\n等级: ${f.level === 'high' ? '高嘌呤' : f.level === 'medium' ? '中嘌呤' : '低嘌呤'}\n\n${tips}`);
}

// ========== 知识文章功能 ==========
function renderArticles() {
    const container = document.getElementById('articleList');
    container.innerHTML = articles.map((a, i) => `
        <div class="article-item" id="article-${i}">
            <div class="article-header" onclick="toggleArticle(${i})">
                <div class="article-title">${i+1}. ${a.title}</div>
                <span class="article-arrow">▼</span>
            </div>
            <div class="article-content"><div class="article-body">${a.content}</div></div>
        </div>
    `).join('');
}

function toggleArticle(idx) {
    const el = document.getElementById('article-' + idx);
    const isOpen = el.classList.contains('open');
    document.querySelectorAll('.article-item').forEach(item => item.classList.remove('open'));
    if (!isOpen) el.classList.add('open');
}

// ========== 工具函数 ==========
function showToast(msg) {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:1000;animation:fadeIn 0.3s;';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 1500);
}

// ========== 快速搜索功能 ==========
function setQuickSearch(keyword) {
    document.getElementById('quickSearch').value = keyword;
    quickSearchFood();
}

function quickSearchFood() {
    const keyword = document.getElementById('quickSearch').value.trim();
    if (!keyword) {
        showToast('请输入食物名称');
        return;
    }
    
    // 切换到饮食Tab
    switchTabDirect('food');
    
    // 设置搜索框值并触发搜索
    document.getElementById('foodSearch').value = keyword;
    searchFood();
    
    // 记录到最近搜索（可扩展）
    console.log('快速搜索:', keyword);
}

function switchTabDirect(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    // 激活对应tab
    const tabIndex = tab === 'record' ? 0 : tab === 'food' ? 1 : 2;
    document.querySelectorAll('.tab-btn')[tabIndex].classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
}

// 启动
init();
</script>
